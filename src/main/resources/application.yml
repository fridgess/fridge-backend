spring:
  application:
    name: ${PROJECT_NAME:fridge-backend}

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      enabled: true

  jackson:
    time-zone: Asia/Seoul

  lifecycle:
    timeout-per-shutdown-phase: 10s

  config:
    import: optional:file:.env[.properties]

server:
  shutdown: graceful
  forward-headers-strategy: native
